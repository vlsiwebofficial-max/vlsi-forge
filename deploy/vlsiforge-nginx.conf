# =============================================================================
# VLSI Forge — Nginx Configuration
# File: /etc/nginx/sites-available/vlsiforge
#
# The setup_server.sh copies this file automatically.
# Certbot will add SSL lines after you run:
#   sudo certbot --nginx -d api.vlsiweb.com
# =============================================================================

# ── Rate limiting zones ────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=submissions:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

# ── HTTP server (certbot will split this into HTTP→HTTPS redirect + HTTPS block) ─
server {
    listen 80;
    listen [::]:80;
    server_name api.vlsiweb.com;

    # Let's Encrypt ACME challenge — must stay here for certbot to work
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # ── Logging ───────────────────────────────────────────────────
    access_log /var/log/nginx/vlsiforge-access.log;
    error_log  /var/log/nginx/vlsiforge-error.log warn;

    # ── Request size limit ────────────────────────────────────────
    client_max_body_size 2M;

    # ── Health check ─────────────────────────────────────────────
    location = /health {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        access_log off;
    }

    # ── Submission endpoint — strict rate limit ───────────────────
    location = /api/submissions {
        limit_req zone=submissions burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── All other API routes ──────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Block everything else ─────────────────────────────────────
    location / {
        return 404 '{"detail":"Not found"}';
        add_header Content-Type application/json;
    }
}
