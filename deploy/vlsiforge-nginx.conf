# =============================================================================
# VLSI Forge — Nginx Configuration
# File: /etc/nginx/sites-available/vlsiforge
#
# Architecture:
#   api.vlsiweb.com  →  this server (FastAPI on 127.0.0.1:8001)
#   vlsiweb.com      →  Vercel (DNS handled separately)
#
# Run after copying:
#   sudo ln -s /etc/nginx/sites-available/vlsiforge /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#   sudo certbot --nginx -d api.vlsiweb.com   (gets free SSL from Let's Encrypt)
# =============================================================================

# ── Rate limiting zones ────────────────────────────────────────────────────────
# Prevent submission spam at the Nginx layer (defense-in-depth with slowapi)
limit_req_zone $binary_remote_addr zone=submissions:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.vlsiweb.com;

    # Let's Encrypt challenge (certbot uses this)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — Main API server ───────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.vlsiweb.com;

    # ── SSL (certbot will auto-fill these after you run certbot) ──
    # ssl_certificate     /etc/letsencrypt/live/api.vlsiweb.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.vlsiweb.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── CORS — allow vlsiweb.com frontend ────────────────────────
    set $cors_origin "";
    if ($http_origin ~* "^https://(www\.)?vlsiweb\.com$") {
        set $cors_origin $http_origin;
    }

    # ── Logging ───────────────────────────────────────────────────
    access_log /var/log/nginx/vlsiforge-access.log;
    error_log  /var/log/nginx/vlsiforge-error.log warn;

    # ── Request size limit (for large Verilog submissions) ────────
    client_max_body_size 2M;

    # ── Health check (no rate limit) ─────────────────────────────
    location = /health {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        access_log off;
    }

    # ── Submission endpoint — strict rate limit ────────────────────
    location = /api/submissions {
        limit_req zone=submissions burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Simulation can take up to 15s — extend timeout
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Content-Length 0;
            return 204;
        }

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
    }

    # ── All other API routes ──────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Session-ID" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Content-Length 0;
            return 204;
        }

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
    }

    # ── Block everything else ─────────────────────────────────────
    location / {
        return 404 '{"detail":"Not found"}';
        add_header Content-Type application/json;
    }
}
